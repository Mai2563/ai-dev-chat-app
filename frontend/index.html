<!doctype html>
<html>
  <head>
    <title>Chat</title>

    <!-- ✅ สำคัญมากสำหรับมือถือ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
      * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      html, body {
        height: 100%;
        margin: 0;
        overflow: hidden; /* 🔥 กัน layout เด้ง */
        background: #f0f2f5;
      }

      /* ─── Container ─── */
      .chat-container {
        max-width: 600px;
        margin: auto;

        height: 100vh;
        height: 100dvh; /* 🔥 FIX iPhone */

        display: flex;
        flex-direction: column;
        background: white;
      }

      /* ─── Header ─── */
      .header {
        padding: 12px;
        text-align: center;
        background: #0084ff;
        color: white;
        font-weight: bold;
      }

      /* ─── Messages ─── */
      .messages {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;

        -webkit-overflow-scrolling: touch; /* 🔥 iPhone smooth */
      }

      .message {
        display: flex;
        margin: 5px 0;
      }

      .message.user {
        justify-content: flex-end;
      }

      .message.other {
        justify-content: flex-start;
      }

      .bubble {
        padding: 10px 12px;
        border-radius: 16px;
        max-width: 75%;
        word-wrap: break-word;
        font-size: 14px;
      }

      /* ขวา */
      .user .bubble {
        background: #0084ff;
        color: white;
      }

      /* ซ้าย */
      .other .bubble {
        background: #e4e6eb;
        color: black;
      }

      .name {
        font-size: 11px;
        margin-bottom: 3px;
        opacity: 0.6;
      }

      /* ─── Input ─── */
      .input-area {
        display: flex;
        gap: 5px;
        padding: 8px;
        border-top: 1px solid #ddd;
        background: white;

        padding-bottom: calc(8px + env(safe-area-inset-bottom)); /* 🔥 */
      }

      .input-area input {
        flex: 1;
        padding: 10px;
        font-size: 16px; /* 🔥 กัน zoom iOS */
        border: 1px solid #ddd;
        border-radius: 8px;
        min-width: 0; /* 🔥 สำคัญ: กัน input ดันปุ่ม */
      }

      .input-area button {
        padding: 10px 14px;
        background: #0084ff;
        color: white;
        border: none;
        border-radius: 8px;
        margin-left: auto; /* 🔥 ดันปุ่มไปขวาสุด */
      }

      /* ─── Mobile ─── */
      @media (max-width: 600px) {
        .chat-container {
          max-width: 100%;
        }

        .bubble {
          max-width: 85%;
        }
      }
    </style>
  </head>

  <body>
    <div class="chat-container">

      <div class="header">
        💬 Chat App
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-area">
        <input id="username" placeholder="Your name" />
        <input id="message" placeholder="Type message..." />
        <button id="sendBtn">Send</button>
      </div>

    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
