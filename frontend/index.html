<!doctype html>
<html>
  <head>
    <title>Chat</title>
    <style>
      body {
        font-family: Arial;
        background: #f0f2f5;
        margin: 0;
      }

      .chat-container {
        max-width: 500px;
        margin: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: white;
        border: 1px solid #ddd;
      }

      .messages {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
      }

      .message {
        display: flex;
        margin: 8px;
      }

      .message.user {
        justify-content: flex-end;
      }

      .message.other {
        justify-content: flex-start;
      }
      
      .bubble {
        padding: 10px;
        border-radius: 12px;
        max-width: 70%;
      }

      .user .bubble {
        background: #0084ff;
        color: white;
      }

      .ai .bubble {
        background: #e4e6eb;
      }

      .input-area {
        display: flex;
        padding: 10px;
        border-top: 1px solid #ddd;
      }

      .input-area input {
        flex: 1;
        padding: 10px;
        margin-right: 5px;
      }

      .input-area button {
        padding: 10px;
      }

      .name {
        font-size: 12px;
        font-weight: bold;
        margin-bottom: 4px;
        opacity: 0.7;
      }
      
      .other .bubble {
        background: #f1f0f0;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="messages" id="messages"></div>

      <div class="input-area">
        <input id="username" placeholder="Your name" />
        <input id="message" placeholder="Type message..." />
        <button id="sendBtn">Send</button>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
